<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="聖徳太子">
<title>聖徳太子</title>
<style>
  :root{
    --paper:#F4F5F3;
    --card:#FBFBFA;
    --ink:#2B302E;
    --muted:#9AA09C;
    --faint:#C7CBC7;
    --line:#E6E8E4;
    --accent:#5B7B77;      /* 落ち着いたスレートグリーン */
    --accent-soft:#5B7B7722;
    --radius:22px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:520px;margin:0 auto;padding:14px 16px 48px;}

  /* ---- 目立たないトップバー ---- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 6px 14px;
  }
  header .brand{font-size:12px;letter-spacing:.22em;color:var(--faint);font-weight:600;}
  .gear{
    background:none;border:none;color:var(--faint);
    width:34px;height:34px;font-size:18px;cursor:pointer;line-height:1;
  }

  /* ---- 卓上時計風 待機カード(タップで開始/停止) ---- */
  .clock{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:40px 24px 34px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:transform .12s ease, box-shadow .3s ease;
    box-shadow:0 1px 0 rgba(0,0,0,.02);
  }
  .clock:active{transform:scale(.992);}
  .clock.rec{
    box-shadow:0 0 0 1px var(--accent-soft), 0 8px 30px rgba(91,123,119,.14);
  }

  /* 時計本体(SVGリング + デジタル表示) */
  .dial{position:relative;width:214px;height:214px;margin:0 auto 8px;}
  .dial svg{position:absolute;inset:0;transform:rotate(-90deg);}
  .dial .track{fill:none;stroke:var(--line);stroke-width:3;}
  .dial .sweep{
    fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;
    stroke-dasharray:1 999;opacity:0;transition:opacity .5s;
  }
  .clock.rec .dial .sweep{opacity:1;}
  .dial .face{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .time{
    font-size:52px;font-weight:200;letter-spacing:.02em;
    font-variant-numeric:tabular-nums;line-height:1;
  }
  .time .colon{transition:opacity .3s;}
  .time .colon.blink{animation:softblink 2s steps(1) infinite;}
  @keyframes softblink{0%,50%{opacity:1}51%,100%{opacity:.25}}
  .date{font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:.14em;}

  /* 待機/記録の状態表示(ごく控えめ) */
  .state{margin-top:22px;height:22px;font-size:13px;color:var(--muted);letter-spacing:.06em;}
  .state .live{color:var(--accent);font-weight:600;}
  .state .live .pip{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--accent);margin-right:7px;vertical-align:1px;
    animation:breathe 2.4s ease-in-out infinite;
  }
  @keyframes breathe{0%,100%{opacity:1}50%{opacity:.3}}
  .elapsed{
    font-variant-numeric:tabular-nums;font-size:13px;color:var(--muted);
    letter-spacing:.08em;
  }
  .clock.disabled{opacity:.55;}

  /* ---- 同意チェック ---- */
  .consent{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin:14px 4px 0;font-size:12px;color:var(--muted);cursor:pointer;
    user-select:none;letter-spacing:.02em;
  }
  .consent input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}

  /* ---- 中断(一時停止)カード ---- */
  .pause-card{
    display:none;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px 20px;margin-top:14px;text-align:center;
  }
  .pause-card p{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:14px;}
  .resume-btn{
    width:100%;padding:16px 0;border-radius:14px;border:none;
    background:var(--accent);color:#fff;font-size:15px;font-weight:600;
    letter-spacing:.04em;cursor:pointer;
  }

  /* ---- 処理中/エラー ---- */
  .notice{
    margin-top:14px;padding:14px 16px;border-radius:14px;
    font-size:13px;line-height:1.75;display:none;text-align:left;
  }
  .notice.busy{display:block;background:var(--accent-soft);color:var(--accent);}
  .notice.error{display:block;background:#B44a3a12;color:#A24736;}
  .notice button{
    margin-top:9px;background:none;border:1px solid currentColor;color:inherit;
    padding:7px 15px;border-radius:9px;font-size:12px;cursor:pointer;
  }

  /* ---- 出力フォーマット切替 ---- */
  /* ---- 履歴 ---- */
  .history-head{
    display:flex;align-items:baseline;justify-content:space-between;
    margin:30px 6px 12px;
  }
  .history-head h2{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.16em;}
  .history-head small{font-size:11px;color:var(--faint);}
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:16px;margin-bottom:11px;
  }
  .card .meta{
    display:flex;justify-content:space-between;align-items:center;
    font-size:11px;color:var(--muted);margin-bottom:9px;
    font-variant-numeric:tabular-nums;letter-spacing:.04em;
  }
  .card .meta .meta-right{display:flex;align-items:baseline;gap:7px;}
  .card .meta .cost{font-size:10px;color:var(--faint);}
  .card .tabs{
    display:flex;gap:6px;margin-bottom:11px;
  }
  .card .tabs button{
    background:none;border:1px solid var(--line);color:var(--muted);
    padding:5px 12px;border-radius:999px;font-size:11px;cursor:pointer;
    letter-spacing:.04em;
  }
  .card .tabs button.active{
    background:var(--accent-soft);border-color:var(--accent-soft);color:var(--accent);font-weight:600;
  }
  .card .text{
    font-size:14px;line-height:1.95;white-space:pre-wrap;word-break:break-word;
    max-height:6.2em;overflow:hidden;position:relative;
  }
  .card.open .text{max-height:none;}
  .card .text.clamped::after{
    content:"";position:absolute;bottom:0;left:0;right:0;height:2em;
    background:linear-gradient(transparent,var(--card));
  }
  .card.open .text.clamped::after{display:none;}
  .card .actions{display:flex;gap:8px;margin-top:13px;}
  .card .actions button{
    flex:1;background:none;border:1px solid var(--line);color:var(--muted);
    padding:9px 0;border-radius:10px;font-size:12px;cursor:pointer;letter-spacing:.04em;
  }
  .card .actions button.primary{color:var(--accent);border-color:var(--accent-soft);}
  .card .actions button.danger{color:#A24736;border-color:#A2473622;}
  .empty{
    text-align:center;color:var(--faint);font-size:13px;padding:30px 0;line-height:1.9;
  }

  /* ---- 設定モーダル ---- */
  .modal-bg{
    position:fixed;inset:0;background:rgba(40,45,42,.4);
    display:none;align-items:flex-end;justify-content:center;z-index:10;
    backdrop-filter:blur(2px);
  }
  .modal-bg.show{display:flex;}
  .modal{
    background:var(--card);border-radius:24px 24px 0 0;
    width:100%;max-width:520px;
    padding:26px 22px calc(30px + env(safe-area-inset-bottom));
    box-shadow:0 -8px 40px rgba(0,0,0,.12);
  }
  .modal h3{font-size:15px;margin-bottom:6px;}
  .modal p{font-size:12px;color:var(--muted);line-height:1.85;margin-bottom:14px;}
  .modal label.fld{display:block;font-size:11px;color:var(--muted);margin:16px 0 6px;letter-spacing:.08em;}
  .modal input, .modal textarea, .modal select{
    width:100%;background:var(--paper);border:1px solid var(--line);
    color:var(--ink);padding:12px 13px;border-radius:11px;font-size:14px;
    font-family:inherit;line-height:1.7;resize:vertical;
    -webkit-appearance:none;appearance:none;
  }
  .modal input.key{font-family:ui-monospace,Menlo,monospace;}
  .modal .row{display:flex;gap:10px;margin-top:20px;}
  .modal .row button{
    flex:1;padding:13px 0;border-radius:13px;font-size:14px;cursor:pointer;border:none;letter-spacing:.04em;
  }
  .btn-save{background:var(--accent);color:#fff;font-weight:600;}
  .btn-cancel{background:none;border:1px solid var(--line)!important;color:var(--muted);}

  .toast{
    position:fixed;left:50%;bottom:calc(28px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);font-size:13px;font-weight:500;
    padding:11px 22px;border-radius:999px;opacity:0;pointer-events:none;
    transition:all .25s;z-index:20;letter-spacing:.04em;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){
    .time .colon.blink,.state .live .pip{animation:none;}
    .clock,.toast{transition:none;}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <span class="brand">聖徳太子</span>
    <button class="gear" id="gearBtn" aria-label="設定">⚙</button>
  </header>

  <div class="pause-card" id="recoveryCard">
    <p>送信できていない録音があります。<br>再送信して報告書を作成しますか？</p>
    <button class="resume-btn" id="recoverBtn">再送信</button>
  </div>

  <!-- 卓上時計風カード:どこをタップしても録音開始/停止 -->
  <section class="clock" id="clockCard" role="button" tabindex="0" aria-label="タップして録音を開始・停止">
    <div class="dial">
      <svg viewBox="0 0 214 214" aria-hidden="true">
        <circle class="track" cx="107" cy="107" r="101"></circle>
        <circle class="sweep" id="sweep" cx="107" cy="107" r="101"></circle>
      </svg>
      <div class="face">
        <div class="time" id="clock"><span id="hh">--</span><span class="colon blink" id="colon">:</span><span id="mm">--</span></div>
        <div class="date" id="date"></div>
      </div>
    </div>
    <div class="state" id="state">画面に触れて録音を開始</div>
  </section>

  <label class="consent" id="consentLabel" for="consentCheck">
    <input type="checkbox" id="consentCheck">
    <span>お客様の同意を得ました</span>
  </label>

  <div class="pause-card" id="pauseCard">
    <p>通話などで録音が一時停止しました。<br>ここまでの内容は保存済みです。</p>
    <button class="resume-btn" id="resumeBtn">録音を再開</button>
  </div>

  <div class="notice" id="notice"></div>

  <div class="history-head">
    <h2>記録</h2>
    <small id="count"></small>
  </div>
  <div id="history"></div>

</div>

<!-- 設定モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>設定</h3>
    <p>OpenAIのAPIキーは、この端末のブラウザ内にだけ保存されます。録音・文字起こしのデータもクラウドには残さず、端末内にのみ保存します。</p>
    <label class="fld" for="keyInput">OpenAI APIキー</label>
    <input class="key" type="password" id="keyInput" placeholder="sk-..." autocomplete="off">
    <label class="fld" for="sendMail">完成後の送信先メール（任意）</label>
    <input type="email" id="sendMail" placeholder="日報の提出先など" autocomplete="off">
    <p>コストは概算です。正確な請求はOpenAIのダッシュボードをご確認ください。</p>
    <div class="row">
      <button class="btn-cancel" id="cancelBtn">閉じる</button>
      <button class="btn-save" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const KEY = 'koememo_api_key';
  const MAIL = 'koememo_mail';
  const HIST = 'koememo_history_v2';

  // ============================================================
  // ここが唯一の「フォーマット定義」箇所です。
  // 配布先(職場/業種)ごとに書き換える場合は、この1ブロックだけを差し替えてください。
  // ============================================================
  // ============================================================
  // 設定ゾーン: 配布先ごとにカスタマイズするのはこのブロックだけ
  // ============================================================

  // コスト概算の単価設定。実際の請求額とは異なる概算値であり、変更する場合はここだけ編集する。
  const COST_CONFIG = {
    usdJpy: 155, // 円換算レート(固定値。自動取得はしない)
    transcribeModel: 'gpt-4o-mini-transcribe', // 文字起こしに実際に使うモデル名(sendChunkのmodel指定と共通)
    chatModel: 'gpt-4o-mini', // 整形AIに実際に使うモデル名(formatのmodel指定と共通)
    // $/分(文字起こし)。モデルをwhisper-1に戻した場合に備え、使用モデルに応じて単価を切り替える
    transcribeRatePerMinUSD: {
      'gpt-4o-mini-transcribe': 0.003,
      'whisper-1': 0.006,
    },
    // $/1Mトークン(整形AI)
    chatRatePerMTokUSD: {
      'gpt-4o-mini': { input: 0.15, output: 0.60 },
    },
  };

  const REPORT_CONFIG = {
    // AIに渡す整形指示。書式や項目を変えたいときはここを編集する。
    systemPrompt:
`## 役割
あなたは保険会社のプロフェッショナルな秘書、および営業支援アシスタントです。
提供された録音データ（文字起こし）に基づき、正確な社内報告書を1本の要約として作成してください。

## 商談種別の判定
まず録音内容から、この商談が「個人商談」か「法人商談」かを判定してください。
- 法人の手がかり：法人・会社・自社株・事業承継・役員・従業員・決算・退職金 など
- 個人の手がかり：ご家族・お子様・配偶者・ご主人・奥様・お子さんの教育・老後 など
判定に基づき、対応するフォーマットのみを使用して出力してください。
（判定理由は出力しない。報告書本文のみを出す）

## フォーマット（個人商談）
【同席者】（お客様側の出席者、および弊社側の同席者）
【面談のきっかけ】（今回会うことになった経緯）
【顕在潜在ニード】（顧客が自覚しているニーズと、会話からうかがえる潜在的なニーズをまとめて記載）
【商品への意向】（提案商品に対する顧客の意向・関心）
【提案理由】（その商品を提案した理由）
【提案内容】（商談で言及された商品名と、金額・期間・回数などの数値条件を記載）
【提案後の反応】（提案に対する顧客の反応・温度感）
【他社保険】（加入中・検討中の他社商品があれば記載）
【紹介】（紹介元・紹介の経緯。なければ記載なし）
【所感備考】（商談の主な内容・決定事項など、上記に収まらない要点）
【課題宿題】（次回までに準備・確認すべき事項、懸念点）
【使用資料】（実際に使用した資料。なければ記載なし）

## フォーマット（法人商談）
【現状と課題】（法人の現状と抱える課題）
【既契約】（既に加入している保険・契約内容）
【対策】（課題に対する対策の方向性）
【保険提案】（提案した保険の内容）
【次回】（次回に向けたアクション）
【懸念】（懸念点・確認が必要な事項）

## 処理プロセス
1. 事実抽出：録音データから、該当項目の「実際に発言された事実」のみを抜き出す。
2. 種別判定：個人／法人を判定し、使うフォーマットを1つに決める。
3. 構成：抽出した事実をもとに、簡潔でプロフェッショナルな文章にまとめる。
   短い商談は無理に長くせず、話された内容の量に応じた自然な長さにする。
4. 内部検算：出力前に、録音に存在しない情報や推測が混じっていないか自己チェックする。
   このチェックの過程は出力せず、最終版の報告書のみを出力する。

## 厳守事項
- 捏造の禁止：録音に存在しない情報（商品名・数字・日付・合意内容など）は創作しない。
- 不明時の対応：不明瞭・情報不足の項目は無理に埋めず「（確認中）」または「（記載なし）」とする。
  空項目でも項目名（見出し）は残す。
- 主観の排除：顧客が明言していない感情や意向を「〜と思われます」等と推測して書かない。
- 雑談の除外：ゴルフ・天気などの雑談は要約に含めない（温度感の判断材料にのみ用いてよい）。
- 用語の正確性：下記の用語集に照らし、誤変換と思われる類似語は文脈から正しい用語に直す。
  ただし会話語（がん・心筋梗塞など）は無理に正式名称へ置換せず自然な表記のまま残す。
  また、オルカン・エスピー（S&P500）・ドルコストなどの投資商品・指数の通称は、
  正式名称に展開せず通称のまま正しい表記で残す。
- 同席者の判定は「その場で発言している人物」を最優先とする。会話中で話題として言及される
  だけの人物（奥様・お子様・ご家族など）は、その人自身の発言が確認できない限り同席者に
  含めない。誰が話しているか判別できない場合は、無理に特定せず「お客様、弊社担当者」など
  役割のみを記載する。
- 数値の取り扱い：【提案内容】（法人商談では【保険提案】も同様）には、商談で言及された
  商品名と数値条件（給付日額・一時金・保険料・払込期間・保障期間・説明に使った治療費や
  制度の金額など）を、話された通りに列挙する。数値は要約・丸め・換算をせず発言のまま
  記載し、聞き取りが不明瞭な数値・前後の文脈と矛盾する数値には「（要確認）」を付ける。
  録音に出ていない数値は、辞書や一般知識からであっても補完しない（捏造とみなす）。
  数値が一切出なかった商談では【提案内容】は「（記載なし）」とする。

## 用語集（第3層）`,
  };

  const DICTIONARY_CONFIG = {
    // 【第1層】Whisperへの事前ヒント。「商談冒頭にありそうな一文」の形式。
    // 句読点を含めることで、文字起こし側にも句読点が付きやすくなる。
    whisperPrompt:
      '本日は学資保険、医療終身保険、変額保険のご説明です。' +
      '上皮内がん、特定3疾病、急性心筋梗塞、脳卒中、差額ベッド代、支払事由、' +
      '解約返戻金、解約控除費用、特別勘定、債券型、責任開始期、告知受領権、診査、' +
      'クーリング・オフ、払込猶予期間、失効取消期間、復活、指定代理請求、' +
      'リビング・ニーズ特約、無解約返戻金型、ご意向についてお話しします。',
    // 第1層(whisperPrompt)を文字起こしAPIに送るかどうかのスイッチ。
    // falseでもwhisperPromptの中身自体は保持したまま、送信だけを止める。
    // 方針: gpt-4o-mini-transcribe使用時は第1層(whisperPrompt)を使わない。
    // whisper-1と違いgpt-4o系はprompt(単語リスト的な事前ヒント)の効き方が異なり、
    // 効果検証ができていないため、モデルをgpt-4o-mini-transcribeに切り替えた
    // タイミングでfalseに固定した(→ model: 'gpt-4o-mini-transcribe' のコメントも参照)。

# 税制
相続税=死亡により財産を相続したときにかかる税。契約者=被保険者の死亡保険金を相続人が受け取る場合はこの対象になる
贈与税=個人から財産をもらったときにかかる税。契約者・被保険者・受取人が全員異なる保険金はこの対象になりうる
所得税=個人の所得にかかる税。契約者=受取人が受け取る満期保険金・解約返戻金は一時所得として所得税の対象になる
譲渡所得=土地・建物・有価証券などの資産を売却して得た所得
一時所得=一時的・偶発的な所得。満期保険金などが該当し、（受取額−払込保険料−特別控除50万円）×1/2が課税対象
法定相続分=民法が定める相続人の取り分の割合（例：配偶者と子なら配偶者1/2・子1/2）
基礎控除=相続税の基礎控除。3000万円＋600万円×法定相続人の数。遺産総額がこれを超えた分に相続税がかかる
死亡保険金の非課税枠=相続人が受け取る死亡保険金のうち「500万円×法定相続人の数」までが非課税になる枠
生命保険料控除=支払った生命保険料に応じて所得から一定額を差し引ける所得控除
満期保険金=保険期間の満了時に受け取るお金
相続人=民法上、被相続人の財産を相続する権利を持つ人
被相続人=亡くなって相続される側の人
遺産分割=相続人どうしで相続財産の分け方を決めること

# 金融・運用
投資信託=投資家から集めた資金を運用会社がまとめて運用する商品。「投信」「ファンド」とも
基準価額=投資信託の1万口あたりの時価。「価格」ではなく「価額」と表記する
信託報酬=投資信託の保有中に日々差し引かれる運用管理費用。「運用管理費用」とも
信託財産留保額=解約時に差し引かれることがある費用
純資産総額=ファンドの資産規模
分散投資=複数の資産・地域・銘柄に分けて投資しリスクを抑えること
積立=毎回一定額を定期的に買い付ける方法。「積立投資」とも
インデックス=市場の指数。指数への連動を目指す運用が「インデックス運用（パッシブ運用）」
アクティブ=指数を上回る成績を目指す運用。「アクティブ運用」
ベンチマーク=運用の目安とする指数
ポートフォリオ=保有資産の組み合わせ
アセットアロケーション=資産配分
リバランス=崩れた資産配分を元の比率に戻すこと
リスク許容度=投資家が受け入れられる損失の範囲
為替ヘッジ=為替変動リスクを抑える仕組み。「ヘッジあり／なし」
複利=運用益がさらに運用に回ることで増える効果
利回り=投資額に対する収益の割合
騰落率=一定期間の値動きの割合
元本=投資したもとのお金。投資信託は元本保証がない
償還=ファンドの運用が終了すること

  会話語「上皮内がん」・約款語「上皮内癌」と同じものを指す(用語集冒頭の「上皮内がん」の項も参照)

脳梗塞=脳卒中の一つ。会話で頻出`,
  };

  const $ = id => document.getElementById(id);
  const clockCard=$('clockCard'), hhEl=$('hh'), mmEl=$('mm'), colonEl=$('colon'),
        dateEl=$('date'), stateEl=$('state'), sweepEl=$('sweep'),
        noticeEl=$('notice'), historyEl=$('history'), countEl=$('count'),
        modalBg=$('modalBg'), keyInput=$('keyInput'), mailInput=$('sendMail'),
        toastEl=$('toast'), consentCheck=$('consentCheck'),
        pauseCardEl=$('pauseCard'), resumeBtnEl=$('resumeBtn'),
        recoveryCardEl=$('recoveryCard'), recoverBtnEl=$('recoverBtn');

  const R = 101, CIRC = 2 * Math.PI * R;
  const CHUNK_MS = 15 * 60 * 1000; // 15分ごとにチャンクを確定

  let mediaRecorder=null, chunks=[], stream=null;
  let recording=false, startTime=0, uiTimer=null;
  let audioCtx=null, wakeLock=null;
  let lastDuration=0, mimeType='', ext='';

  // ===== 長時間録音(チャンク分割)のセッション状態 =====
  // 各チャンクは {idx, blob, status:'recorded'|'sending'|'done'|'failed', text, attempts, authError} で保持する。
  // 送信に失敗しても blob は破棄せず、復帰後・オンライン復帰後・停止後にまとめて再送する。
  let sessionActive=false, paused=false, ending=false;
  let chunkList=[], rotateTimer=null, queuePromise=null, sessionId=null;
  const MAX_RETRY = 3, RETRY_DELAY_MS = 4000;

  // ===== 永続化(IndexedDB) =====
  // 確定したチャンクは音声Blob付きで即座にIndexedDBへ保存し、送信失敗・リロード・
  // アプリ終了があっても失われないようにする。失敗しても録音自体は止めず、console.logのみに留める。
  const DB_NAME = 'shotokutaishi_db', DB_VERSION = 1;
  let dbPromise = null;
  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains('chunks')){
          const store = db.createObjectStore('chunks', { keyPath:'key' });
          store.createIndex('sessionId', 'sessionId', { unique:false });
        }
        if(!db.objectStoreNames.contains('sessions')){
          db.createObjectStore('sessions', { keyPath:'sessionId' });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }
  async function idbPut(storeName, value){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).put(value);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
  }
  async function idbGetAll(storeName){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const req = db.transaction(storeName, 'readonly').objectStore(storeName).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async function idbGetAllByIndex(storeName, indexName, value){
    const db = await openDB();
    return new Promise((resolve, reject) => {
      const req = db.transaction(storeName, 'readonly').objectStore(storeName).index(indexName).getAll(value);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }

  // チャンク1件を保存(done済みなら容量節約のため音声Blobは保存しない)
  async function persistChunk(c){
    try{
      await idbPut('chunks', {
        key: `${sessionId}_${c.idx}`, sessionId, idx: c.idx,
        blob: c.status==='done' ? null : c.blob,
        status: c.status, text: c.text, attempts: c.attempts, authError: c.authError
      });
    }catch(e){ console.log('[IndexedDB] チャンク保存に失敗', e); }
  }
  async function touchSession(){
    try{
      await idbPut('sessions', { sessionId, startTime, elapsedSec: Math.floor((Date.now()-startTime)/1000) });
    }catch(e){ console.log('[IndexedDB] セッション情報の保存に失敗', e); }
  }
  // セッション完了・破棄時に、そのセッションのチャンク・セッションレコードを全削除する
  async function clearSessionFromDB(sid){
    try{
      const db = await openDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(['chunks','sessions'], 'readwrite');
        const cursorReq = tx.objectStore('chunks').index('sessionId').openCursor(IDBKeyRange.only(sid));
        cursorReq.onsuccess = e => { const cur=e.target.result; if(cur){ cur.delete(); cur.continue(); } };
        tx.objectStore('sessions').delete(sid);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }catch(e){ console.log('[IndexedDB] セッション削除に失敗', e); }
  }

  // 起動時:未完了セッションが残っていれば復旧バナーを出す
  async function checkForRecovery(){
    try{
      const sessions = await idbGetAll('sessions');
      if(!sessions.length) return;
      sessions.sort((a,b)=>b.startTime-a.startTime);
      const s = sessions[0];
      const storedChunks = await idbGetAllByIndex('chunks','sessionId', s.sessionId);
      if(!storedChunks.length){ await clearSessionFromDB(s.sessionId); return; }
      showRecoveryBanner(s, storedChunks);
    }catch(e){ console.log('[IndexedDB] 復旧チェックに失敗', e); }
  }
  function showRecoveryBanner(s, storedChunks){
    recoveryCardEl.style.display = 'block';
    recoverBtnEl.disabled = false;
    recoverBtnEl.onclick = async () => {
      recoverBtnEl.disabled = true; // 二度押し防止
      recoveryCardEl.style.display = 'none';
      await recoverSession(s, storedChunks);
    };
  }
  // 保存されていたチャンクからchunkListを復元し、既存の送信→整形フローに合流する
  async function recoverSession(s, storedChunks){
    sessionId = s.sessionId;
    lastDuration = s.elapsedSec || 0;
    chunkList = storedChunks
      .slice()
      .sort((a,b)=>a.idx-b.idx)
      .map(sc => ({
        idx: sc.idx, blob: sc.blob,
        status: sc.status==='done' ? 'done' : 'recorded', // 未完了分はもう一度送信させる
        text: sc.text, attempts: 0, authError: false
      }));
    stateEl.textContent = '処理中…';
    await finalizeSession();
  }

  // ===== 時計表示 =====
  function pad(n){ return String(n).padStart(2,'0'); }
  function updateClock(){
    const now = new Date();
    hhEl.textContent = pad(now.getHours());
    mmEl.textContent = pad(now.getMinutes());
    dateEl.textContent = now.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
    // 録音中は秒に応じてリングをゆっくり回す(秒針のように=時計に見える)
    if (recording){
      const sec = now.getSeconds() + now.getMilliseconds()/1000;
      const len = (sec/60) * CIRC;
      sweepEl.style.strokeDasharray = `${len} ${CIRC}`;
    }
  }
  setInterval(updateClock, 250);
  updateClock();

  // ===== 録音フォーマット判定 =====
  function pickMime(){
    const c=[['audio/mp4','mp4'],['audio/webm;codecs=opus','webm'],['audio/webm','webm']];
    for(const [m,e] of c){ if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m)) return [m,e]; }
    return ['','webm'];
  }
  function fmtTime(sec){ return `${pad(Math.floor(sec/60))}:${pad(Math.floor(sec%60))}`; }

  function notice(type, html){ noticeEl.className='notice '+type; noticeEl.innerHTML=html; }
  function clearNotice(){ noticeEl.className='notice'; noticeEl.innerHTML=''; }
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'),1900); }

  // ===== 録音 =====
  async function start(){
    if(!consentCheck.checked){ toast('お客様の同意確認後に録音を開始してください'); return; }
    if(!localStorage.getItem(KEY)){ openModal(); toast('先にAPIキーを設定してください'); return; }
    try{ stream = await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ notice('error','マイクを使用できませんでした。設定 → Safari → マイク で許可を確認してください。'); return; }
    clearNotice();
    [mimeType, ext] = pickMime();
    try{ wakeLock = await navigator.wakeLock?.request('screen'); }catch(e){}

    sessionActive=true; paused=false; ending=false;
    chunkList=[];
    sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
    recording=true; startTime=Date.now();
    clockCard.classList.add('rec');
    colonEl.classList.remove('blink');   // 録音中はコロンが点滅を止める(操作者だけが分かる合図)
    renderState();
    uiTimer = setInterval(renderState, 500);
    beginChunk();
  }

  // 新しいチャンクのMediaRecorderを開始し、15分後の自動確定を予約する
  function beginChunk(){
    chunks=[];
    mediaRecorder = new MediaRecorder(stream, mimeType?{mimeType}:undefined);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
    mediaRecorder.onstop = handleChunkStopped;
    mediaRecorder.start(1000);
    clearTimeout(rotateTimer);
    rotateTimer = setTimeout(rotateChunk, CHUNK_MS);
  }

  // 15分経過:録音を途切れさせずにMediaRecorderだけ切り替える(handleChunkStoppedが次チャンクを開始する)
  function rotateChunk(){
    if(!sessionActive || paused || ending) return;
    if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
  }

  function renderState(){
    const sec = Math.floor((Date.now()-startTime)/1000);
    stateEl.innerHTML = `<span class="live"><span class="pip"></span>記録中</span>　<span class="elapsed">${fmtTime(sec)}</span>`;
  }

  // ユーザーが時計をタップしてセッション全体を終える
  function stop(){
    ending=true;
    clearTimeout(rotateTimer);
    lastDuration = Math.floor((Date.now()-startTime)/1000);
    recording=false;
    clearInterval(uiTimer);
    if(audioCtx){ audioCtx.close(); audioCtx=null; }
    if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; }
    clockCard.classList.remove('rec');
    colonEl.classList.add('blink');
    sweepEl.style.strokeDasharray = `1 ${CIRC}`;
    stateEl.textContent = '処理中…';
    if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
    if(stream){ stream.getTracks().forEach(t=>t.stop()); }
  }

  // ===== 中断対策(バックグラウンド遷移) =====
  document.addEventListener('visibilitychange', () => {
    if(document.hidden && sessionActive && !paused && !ending) enterPaused();
  });

  // ネットワーク復帰時、フォアグラウンドであれば未送信チャンクの再送を自動で試みる
  window.addEventListener('online', () => {
    if(sessionActive && !paused) processPendingChunks(true);
  });

  function enterPaused(){
    paused=true;
    clearTimeout(rotateTimer);
    clearInterval(uiTimer);
    if(mediaRecorder && mediaRecorder.state==='recording') mediaRecorder.stop();
    if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
    wakeLock=null; // バックグラウンド遷移で自動解放されるため参照だけリセットする
    clockCard.classList.remove('rec');
    stateEl.textContent='一時停止中';
    pauseCardEl.style.display='block';
  }

  resumeBtnEl.onclick = async () => {
    try{ stream = await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ notice('error','マイクを再度取得できませんでした。設定 → Safari → マイク で許可を確認してください。'); return; }
    try{ wakeLock = await navigator.wakeLock?.request('screen'); }catch(e){}
    paused=false;
    pauseCardEl.style.display='none';
    clockCard.classList.add('rec');
    colonEl.classList.remove('blink');
    recording=true;
    renderState();
    uiTimer = setInterval(renderState, 500);
    beginChunk();
    processPendingChunks(true); // 中断中に送れなかったチャンクをまとめて送信する
  };

  // MediaRecorderが停止するたびに呼ばれる(15分ローテーション/中断/最終停止のいずれでも共通)
  function handleChunkStopped(){
    const blob = new Blob(chunks,{type:mimeType||'audio/webm'});
    chunks=[];
    const idx = chunkList.length;

    // 唯一のチャンクで、かつ終了操作による停止 → 従来通り「短すぎる録音」エラーとしてセッションを中断
    if(ending && idx===0 && blob.size<2000){
      resetSessionState();
      resetState();
      notice('error','録音が短すぎるようです。もう一度お試しください。');
      return;
    }

    // 録音データの確保を最優先:送信の成否に関わらず、まず必ず'recorded'として保存する
    const c = { idx, blob, status:'recorded', text:null, attempts:0, authError:false };
    chunkList.push(c);
    persistChunk(c);   // IndexedDBへ保存(録音継続を優先し、完了を待たずに次のチャンクへ進む)
    touchSession();

    if(ending){
      finalizeSession();
    }else if(!paused){
      beginChunk();
      processPendingChunks(); // 逐次送信は維持する(録音中は無言でバックグラウンド送信)
    }
    // paused の場合は送信を試みない(復帰後・オンライン復帰後にまとめて送る)
  }

  function resetState(){ stateEl.textContent='画面に触れて録音を開始'; }

  function resetSessionState(){
    const sidToClean = sessionId;
    sessionActive=false; paused=false; ending=false;
    chunkList=[]; sessionId=null;
    mediaRecorder=null; stream=null;
    pauseCardEl.style.display='none';
    consentCheck.checked=false; // 録音1回ごとに同意を取り直す
    updateConsentUI();
    if(sidToClean){
      clearSessionFromDB(sidToClean).then(checkForRecovery); // 完了したセッションを片付け、他に残っているものがあれば続けて案内する
    }
  }

  // ===== 文字起こし(Whisper) → 必要なら整形(Chat) =====
  function applyExactReplace(text){
    let result = text;
    for (const [wrong, right] of Object.entries(DICTIONARY_CONFIG.exactReplace)){
      if (result.includes(wrong)){
        console.log('[辞書置換]', wrong, '->', right);
        result = result.split(wrong).join(right);
      }
    }
    return result;
  }

  // 1チャンク分をWhisperに送信する。直前チャンクの文字起こし末尾をpromptに連結し文脈をつなぐ。
  // 失敗してもchunkListからは削除せず、'failed'として保持する(最大MAX_RETRY回まで自動リトライ)。
  async function sendChunk(c){
    if(c.blob.size<2000){ c.status='done'; c.text=''; await persistChunk(c); return; } // 最終チャンクの端数など、極端に短いものは無視
    if(c.blob.size>24*1024*1024){
      c.status='failed'; c.attempts=MAX_RETRY; // リトライしても改善しないため上限扱いにする
      notice('error', `チャンク${c.idx+1}の録音データが大きすぎます(上限は約25MB)。`);
      await persistChunk(c);
      return;
    }
    c.status='sending';
    const key = localStorage.getItem(KEY);
    const fd = new FormData();
    fd.append('file', c.blob, `rec_${c.idx}.`+ext);
    // response_formatは未指定=デフォルトのjsonを使用。gpt-4o-mini-transcribeはjson/textのみ対応
    // (verbose_json/srt/vttはwhisper-1専用)なので、data.textを読むこの実装のままで互換。
    // 第1層(DICTIONARY_CONFIG.whisperPrompt)は使わない方針(useWhisperPrompt=false)。
    fd.append('model', COST_CONFIG.transcribeModel);
    fd.append('language','ja');
    if(DICTIONARY_CONFIG.useWhisperPrompt){
      let promptText = DICTIONARY_CONFIG.whisperPrompt;
      if(c.idx>0){
        const prev = chunkList[c.idx-1];
        const tail = ((prev && prev.text) || '').slice(-150);
        if(tail) promptText += ' ' + tail;
      }
      fd.append('prompt', promptText);
    }
    try{
      const res = await fetch('https://api.openai.com/v1/audio/transcriptions',{
        method:'POST', headers:{'Authorization':'Bearer '+key}, body:fd
      });
      if(!res.ok){
        const err = new Error('http'+res.status); err.status = res.status; throw err;
      }
      const data = await res.json();
      c.text = applyExactReplace((data.text||'').trim());
      c.status = 'done';
      await persistChunk(c); // 保存してからメモリ上の音声Blobを解放する
      c.blob = null;
    }catch(e){
      c.attempts++;
      if(e && e.status===401) c.authError = true;
      console.log(`[チャンク${c.idx+1}] 送信失敗(${c.attempts}回目)`, e);
      if(c.attempts < MAX_RETRY && !paused){
        await new Promise(r=>setTimeout(r, RETRY_DELAY_MS));
        await sendChunk(c);
        return;
      }
      c.status = 'failed';
      await persistChunk(c);
    }
  }

  function doneCount(){ return chunkList.filter(c=>c.status==='done').length; }

  // chunkList内の未送信('recorded')・再送待ち('failed'かつリトライ上限未満)を順番に送信するキュー処理。
  // 同時に複数箇所から呼ばれても二重実行しないよう、実行中のPromiseを使い回す。
  function processPendingChunks(verbose){
    if(queuePromise) return queuePromise;
    queuePromise = runQueue(!!verbose).finally(()=>{ queuePromise=null; });
    return queuePromise;
  }
  async function runQueue(verbose){
    for(const c of chunkList){
      if(c.status==='done' || c.status==='sending') continue;
      if(c.status==='failed' && c.attempts>=MAX_RETRY) continue; // 自動リトライ上限。手動再送信待ち
      if(paused) return; // 中断中は録音データ確保を優先し、送信は試みない
      if(verbose) notice('busy', `未送信のチャンクを送信中…(${doneCount()}/${chunkList.length})`);
      await sendChunk(c);
      if(verbose) notice('busy', `未送信のチャンクを送信中…(${doneCount()}/${chunkList.length})`);
    }
  }

  // 停止操作後、残っている未送信・失敗チャンクをすべて送り切ってから、録音順に連結して整形AIに渡す
  async function finalizeSession(){
    await processPendingChunks(true);
    const stillPending = chunkList.filter(c=>c.status!=='done');
    if(stillPending.length>0){
      stateEl.textContent = '処理中…';
      const authFailed = stillPending.some(c=>c.authError);
      const msg = authFailed
        ? 'APIキーが正しくないようです。設定(⚙)から確認してください。'
        : '一部の録音が送信できませんでした。電波の良い場所で「再送信」を押してください。';
      notice('error', msg + '<br><button id="manualRetryBtn">再送信</button>');
      $('manualRetryBtn').onclick = manualRetry;
      return; // 整形には進まない。録音データ(chunkList)は保持したまま
    }
    const raw = chunkList.map(c=>c.text).filter(t=>t).join('\n') || '（音声を認識できませんでした）';
    notice('busy','内容を整えています…');
    const key = localStorage.getItem(KEY);
    const result = await format(raw, key);
    const costJPY = calcCostJPY(lastDuration, result && result.usage);
    finish(result ? result.text : null, raw, costJPY);
    resetSessionState();
  }

  // 録音時間(秒)とchat completionsのusageから、概算コスト(円・整数)を計算する。
  // 録音時間は一時停止を挟んだセッションでは実際の音声時間よりやや多めに出ることがあるが、
  // あくまで概算表示のためのものなので、既存のlastDurationをそのまま使う。
  function calcCostJPY(durationSec, usage){
    const transcribeRate = COST_CONFIG.transcribeRatePerMinUSD[COST_CONFIG.transcribeModel] || 0;
    const transcribeUSD = (durationSec/60) * transcribeRate;
    let chatUSD = 0;
    const chatRate = COST_CONFIG.chatRatePerMTokUSD[COST_CONFIG.chatModel];
    if(usage && chatRate){
      chatUSD = (usage.prompt_tokens||0)/1e6*chatRate.input + (usage.completion_tokens||0)/1e6*chatRate.output;
    }
    return Math.round((transcribeUSD + chatUSD) * COST_CONFIG.usdJpy);
  }

  // 「再送信」ボタン: 失敗チャンクのリトライ回数をリセットしてもう一度送信を試みる
  async function manualRetry(){
    const btn = $('manualRetryBtn');
    if(btn) btn.disabled = true; // 二度押し防止
    for(const c of chunkList){ if(c.status==='failed') c.attempts=0; }
    clearNotice();
    await finalizeSession();
  }

  async function format(text, key){
    try{
      const res = await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':'Bearer '+key,'Content-Type':'application/json'},
        body:JSON.stringify({
          model: COST_CONFIG.chatModel,
          messages:[{role:'system',content:
            REPORT_CONFIG.systemPrompt +
            '\n' + DICTIONARY_CONFIG.llmGlossary +
            '\n\n' + DICTIONARY_CONFIG.contextNotes
          },{role:'user',content:text}],
          temperature:0.2
        })
      });
      if(!res.ok) return null;
      const d = await res.json();
      return { text: (d.choices?.[0]?.message?.content||'').trim(), usage: d.usage || null };
    }catch(e){ return null; }
  }

  function finish(text, raw, costJPY){
    saveEntry(text || raw, raw, lastDuration, costJPY);
    clearNotice(); resetState();
    toast('記録が完成しました');
  }

  // ===== 履歴 =====
  function loadHistory(){ try{return JSON.parse(localStorage.getItem(HIST))||[];}catch(e){return [];} }
  function saveEntry(text, raw, duration, costJPY){
    const list=loadHistory();
    list.unshift({
      id:Date.now(),
      date:new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
      duration:fmtTime(duration), text, raw, costJPY
    });
    localStorage.setItem(HIST, JSON.stringify(list));
    renderHistory();
  }
  function deleteEntry(id){
    localStorage.setItem(HIST, JSON.stringify(loadHistory().filter(e=>e.id!==id)));
    renderHistory();
  }
  function renderHistory(){
    const list=loadHistory();
    if(!list.length){
      countEl.textContent = '';
      historyEl.innerHTML='<div class="empty">まだ記録がありません。<br>面談のあとに、ここへ整理された記録が並びます。</div>';
      return;
    }
    const now = new Date();
    const monthTotal = list.reduce((sum,e)=>{
      if(typeof e.costJPY!=='number') return sum;
      const d = new Date(e.id);
      const sameMonth = d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth();
      return sameMonth ? sum+e.costJPY : sum;
    }, 0);
    countEl.textContent = `${list.length}件・今月:約${monthTotal.toLocaleString('ja-JP')}円`;
    historyEl.innerHTML='';
    const mail = localStorage.getItem(MAIL)||'';
    for(const e of list){
      const hasRaw = e.raw;
      const costText = typeof e.costJPY==='number' ? `約${e.costJPY.toLocaleString('ja-JP')}円` : '-';
      const card=document.createElement('div'); card.className='card';
      card.innerHTML=`
        <div class="meta"><span>${e.date}</span><span class="meta-right">${e.duration}<span class="cost">${costText}</span></span></div>
        ${hasRaw ? `<div class="tabs">
          <button class="tab-fmt active" data-tab="fmt">商談記録</button>
          <button class="tab-raw" data-tab="raw">話した内容そのまま</button>
        </div>` : ''}
        <div class="text"></div>
        <div class="actions">
          <button class="copy">コピー</button>
          <button class="primary mail">メールで送る</button>
          <button class="expand">全文</button>
          <button class="danger del">削除</button>
        </div>`;
      const t=card.querySelector('.text');
      let showingRaw = false;
      const renderText = () => {
        t.textContent = showingRaw ? e.raw : e.text;
        t.classList.remove('clamped');
        requestAnimationFrame(()=>{
          if(t.scrollHeight>t.clientHeight+4 && !card.classList.contains('open')) t.classList.add('clamped');
        });
      };
      renderText();
      const expandBtn = card.querySelector('.expand');
      requestAnimationFrame(()=>{
        if(t.scrollHeight<=t.clientHeight+4) expandBtn.style.display='none';
      });
      if(hasRaw){
        const tabFmt = card.querySelector('.tab-fmt'), tabRaw = card.querySelector('.tab-raw');
        tabFmt.onclick=()=>{ showingRaw=false; tabFmt.classList.add('active'); tabRaw.classList.remove('active'); renderText(); };
        tabRaw.onclick=()=>{ showingRaw=true; tabRaw.classList.add('active'); tabFmt.classList.remove('active'); renderText(); };
      }
      card.querySelector('.copy').onclick=async()=>{ try{await navigator.clipboard.writeText(showingRaw?e.raw:e.text);toast('コピーしました');}catch(err){toast('コピーできませんでした');} };
      card.querySelector('.mail').onclick=()=>{
        const subject=encodeURIComponent(`商談記録 ${e.date}`);
        const body=encodeURIComponent(e.text);
        const to=encodeURIComponent(mail);
        location.href=`mailto:${to}?subject=${subject}&body=${body}`;
      };
      expandBtn.onclick=ev=>{ card.classList.toggle('open'); ev.target.textContent=card.classList.contains('open')?'閉じる':'全文'; };
      card.querySelector('.del').onclick=()=>{ if(confirm('この記録を削除しますか?')) deleteEntry(e.id); };
      historyEl.appendChild(card);
    }
  }

  // ===== 設定 =====
  function openModal(){
    keyInput.value=localStorage.getItem(KEY)||'';
    mailInput.value=localStorage.getItem(MAIL)||'';
    modalBg.classList.add('show');
  }
  $('gearBtn').onclick=openModal;
  $('cancelBtn').onclick=()=>modalBg.classList.remove('show');
  modalBg.onclick=e=>{ if(e.target===modalBg) modalBg.classList.remove('show'); };
  $('saveBtn').onclick=()=>{
    const k=keyInput.value.trim(), m=mailInput.value.trim();
    if(k && !k.startsWith('sk-')){ toast('「sk-」で始まるキーを入力してください'); return; }
    k?localStorage.setItem(KEY,k):localStorage.removeItem(KEY);
    m?localStorage.setItem(MAIL,m):localStorage.removeItem(MAIL);
    modalBg.classList.remove('show');
    toast('保存しました');
    renderHistory();
  };

  // ===== タップで開始/停止(カード全体が対象) =====
  function toggle(){
    if(paused || ending) return; // 一時停止中は専用の再開ボタンのみで再開させる
    recording ? stop() : start();
  }
  clockCard.addEventListener('click', toggle);
  clockCard.addEventListener('keydown', e=>{ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); toggle(); } });

  // ===== 同意チェックの見た目連動 =====
  function updateConsentUI(){ clockCard.classList.toggle('disabled', !consentCheck.checked); }
  consentCheck.addEventListener('change', updateConsentUI);
  updateConsentUI();

  // ===== 初期化 =====
  renderHistory();
  checkForRecovery(); // 前回終了時に送信できていない録音が残っていないか確認する
  if(!localStorage.getItem(KEY)) setTimeout(openModal, 400);
})();
</script>
</body>
</html>
